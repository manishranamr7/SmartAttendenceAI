# ======================================================
# APPLICATION BASIC CONFIG
# ======================================================
spring.application.name=smart-attendance-backend
app.base-url=http://localhost:8080
server.port=8080

# ======================================================
# DATABASE CONFIG (PostgreSQL)
# ======================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_attendance_ai
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ======================================================
# JWT CONFIG
# ======================================================
jwt.secret=SmartAttendanceSecretKey@12345
jwt.expiration=86400000

# ======================================================
# SPRING SECURITY
# ======================================================
spring.security.user.name=disabled
spring.security.user.password=disabled

