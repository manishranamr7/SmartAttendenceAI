# ======================================================
# FILE UPLOAD
# ======================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
face.storage.path=faces/

# ======================================================
# OPENCV CONFIG
# ======================================================
# Change path if your OpenCV is installed elsewhere
# OpenCV path — leave EMPTY to use bundled openpnp 4.7.0 (works on Windows/Linux/Mac)
# Windows manual: opencv.lib.path=C:\\OpenCV\\build\\java\\x64\\opencv_java470.dll
# Linux manual:   opencv.lib.path=/usr/local/lib/libopencv_java470.so
opencv.lib.path=

# ======================================================
# SWAGGER / OPENAPI
# ======================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ======================================================
# LOGGING
# ======================================================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
