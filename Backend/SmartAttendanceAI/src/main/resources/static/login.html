<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Attendance AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md rounded-3xl bg-white shadow-2xl shadow-slate-200 p-8">
            <div class="mb-8">
                <p class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-600">Smart Attendance AI</p>
                <h1 class="mt-3 text-3xl font-extrabold">Login</h1>
                <p class="mt-2 text-sm text-slate-500">Registration complete. Sign in with your invited email and password.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="email" class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
                    <input id="email" name="email" type="email" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-sky-500" required>
                </div>

                <div>
                    <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
                    <input id="password" name="password" type="password" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-sky-500" required>
                </div>

                <button id="submitBtn" type="submit" class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-bold text-white transition hover:bg-sky-600">
                    Sign In
                </button>
            </form>

            <p id="message" class="mt-4 text-sm text-slate-500"></p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");
        if (email) {
            document.getElementById("email").value = email;
        }

        document.getElementById("loginForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const submitBtn = document.getElementById("submitBtn");
            const message = document.getElementById("message");
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in...";
            message.textContent = "";

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                });

                const contentType = response.headers.get("content-type") || "";
                const payload = contentType.includes("application/json")
                    ? await response.json()
                    : await response.text();

                if (!response.ok) {
                    const errorMessage = typeof payload === "string"
                        ? payload
                        : payload.message || "Login failed";
                    throw new Error(errorMessage);
                }

                if (payload.token) {
                    localStorage.setItem("token", payload.token);
                }
                if (payload.role) {
                    localStorage.setItem("role", payload.role);
                }

                message.textContent = "Login successful. Token saved in browser storage.";
                message.className = "mt-4 text-sm text-emerald-600";
            } catch (error) {
                message.textContent = error.message;
                message.className = "mt-4 text-sm text-rose-600";
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign In";
            }
        });
    </script>
</body>
</html>
