    <script>
        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            
            let icon = 'fa-check-circle';
            let colorClass = 'text-green-600';
            let borderClass = 'border-green-200';
            let bgClass = 'bg-white/90';

            if (type === 'error') {
                icon = 'fa-circle-exclamation';
                colorClass = 'text-red-500';
                borderClass = 'border-red-200';
            } else if (type === 'warning') {
                icon = 'fa-triangle-exclamation';
                colorClass = 'text-orange-500';
                borderClass = 'border-orange-200';
            } else if (type === 'info') {
                icon = 'fa-circle-info';
                colorClass = 'text-brand-500';
                borderClass = 'border-brand-200';
            }

            toast.className = `pointer-events-auto flex items-center gap-3 px-5 py-4 rounded-xl-p shadow-xl border ${borderClass} ${bgClass} backdrop-blur-xl transform transition-all duration-300 translate-x-full opacity-0 min-w-[300px]`;
            
            toast.innerHTML = `
                <i class="fa-solid ${icon} ${colorClass} text-xl"></i>
                <p class="text-sm font-bold text-slate-800 flex-1">${message}</p>
                <button onclick="this.parentElement.remove()" class="ml-4 text-slate-400 hover:text-slate-700 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);

            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.remove('translate-x-0', 'opacity-100');
                    toast.classList.add('translate-x-full', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        // --- Render Sidebar ---

            const navContainer = document.getElementById('sidebar-nav');

                <button onclick="switchView('${item.id}')" 
                    class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl-p font-medium transition-all ${currentView === item.id 
                        ? 'bg-brand-50 text-brand-600 shadow-sm ring-1 ring-brand-100/50'

                    <i class="fa-solid ${item.icon} w-5 text-center"></i> 
                    ${item.label}
                </button>
            `).join('');
        }

        // --- View Router ---

            currentView = viewId;
            renderSidebar();
            
            const content = document.getElementById('main-content');

            content.classList.add('fade-in');

                            <input type="time" id="tStartTime" class="input-field text-slate-600">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 mb-2 block uppercase tracking-wider">End Time</label>
                            <input type="time" id="tEndTime" class="input-field text-slate-600">
                        </div>
                        <div class="flex items-end">
                            <button id="saveTimetableBtn" class="w-full bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white px-4 py-3 rounded-xl-p font-bold transition-all shadow-lg shadow-brand-500/30 hover:-translate-y-0.5">
                                Save Timetable
                            </button>
                        </div>
                    </div>
                </div>

                <div class="glass-panel rounded-2xl-p overflow-hidden border border-white/60 shadow-md">
                    <div class="p-6 bg-slate-50/50 border-b border-slate-100 backdrop-blur-sm"><h4 class="font-bold text-slate-700">Current Schedule</h4></div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-white/50 text-slate-500 text-xs uppercase font-bold tracking-wider border-b border-slate-100">
                                <tr>
                                    <th class="px-6 py-4">Batch</th>
                                    <th class="px-6 py-4">Subject</th>
                                    <th class="px-6 py-4">Faculty</th>
                                    <th class="px-6 py-4">Classroom</th>
                                    <th class="px-6 py-4">Day & Time</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="timetableTableAdvanced" class="divide-y divide-slate-100 font-medium text-slate-700">
                                <tr><td colspan="7" class="text-center py-8 text-slate-400"><i class="fa-solid fa-spinner fa-spin"></i> Loading data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        /* =========================================================
           🚀 API BASED LOGIC (No localStorage for Data)
           ========================================================= */

        /* ---------- BATCH MANAGEMENT LOGIC ---------- */
        async function fetchBatches() {
            try {
                const res = await fetch(`${API_BASE}/batches`, { headers: getHeaders() });
                if (res.ok) {
                    batches = await res.json();
                }
            } catch (err) {
                console.error("Batch fetch error:", err);
            }
            renderBatches();
        }

        async function initBatchManagement() {
            await fetchBatches();

            const btn = document.getElementById('addBatchBtn');
            if (btn) {
                btn.onclick = async () => {
                    const dept = document.getElementById('bDept').value.trim().toUpperCase();
                    const year = document.getElementById('bYear').value.trim();
                    const section = document.getElementById('bSection').value.trim().toUpperCase();

                    if (!dept || !year || !section) {
                        showToast("Please fill in all batch details.", "warning");
                        return;
                    }

                    btn.disabled = true;
                    const origTxt = btn.innerText;
                    btn.innerText = "Creating...";

                    try {
                        const response = await fetch(`${API_BASE}/batches`, {
                            method: "POST",
                            headers: getHeaders(),
                            body: JSON.stringify({
                                department: dept,
                                year: parseInt(year),
                                section: section
                            })
                        });

                        if (response.ok) {
                            showToast("Batch created successfully.", "success");
                            clearInputs(['bDept', 'bYear', 'bSection']);
                            await fetchBatches(); // Refresh table
                        } else {
                            const errText = await response.text();
                            showToast("Failed to create batch: " + errText, "error");
                        }
                    } catch (err) {
                        showToast("Server connection failed. Please try again.", "error");
                    } finally {
                        btn.disabled = false;
                        btn.innerText = origTxt;
                    }
                };
            }
        }

        function renderBatches() {
            const tbody = document.getElementById('batchTable');
            if (!tbody) return;

            if (batches.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-400">No batches created yet.</td></tr>`;
                return;
            }

            tbody.innerHTML = batches.map(b => {
                const name = b.name || `${b.department}-${b.year}-${b.section}`;
                return `
                    <tr class="hover:bg-brand-50/30 transition-colors">
                        <td class="px-6 py-4 font-mono text-brand-600">${b.id}</td>
                        <td class="px-6 py-4 font-bold text-slate-800">${escapeHtml(name)}</td>
                        <td class="px-6 py-4 text-slate-600">${escapeHtml(b.department)}</td>
                        <td class="px-6 py-4 text-slate-600">Year ${escapeHtml(b.year)}</td>
                        <td class="px-6 py-4 text-slate-600">Section ${escapeHtml(b.section)}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteItem(${b.id}, 'batch')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        /* ---------- STUDENT MANAGEMENT LOGIC ---------- */
        async function fetchStudents() {
            try {
                const res = await fetch(`${API_BASE}/students`, { headers: getHeaders() });
                if (res.ok) students = await res.json();
            } catch(e) { console.error(e); }
            renderStudents();
        }

        async function initStudentManagement() {
            await fetchBatches();
            await fetchStudents();

            const batchSelect = document.getElementById('sBatch');
            if (batchSelect) {
                batchSelect.innerHTML = `<option value="">Select Batch...</option>` + 
                    batches.map(b => `<option value="${b.id}">${escapeHtml(b.name || `${b.department}-${b.year}-${b.section}`)}</option>`).join('');
            }

            const btn = document.getElementById('addStudentBtn');
            if (btn) {
                btn.onclick = async () => {
                    const fullName = document.getElementById('sName').value.trim();
                    const email = document.getElementById('sEmail').value.trim();
                    const mobile = document.getElementById('sMobile').value.trim();
                    const selectedBatchId = batchSelect ? batchSelect.value : '';

                    if (!fullName || !email || !mobile || !selectedBatchId) {
                        showToast("Please fill all fields and select a batch.", "warning");
                        return;
                    }

                    const nameParts = fullName.split(' ');
                    const firstName = nameParts[0];
                    const lastName = nameParts.length > 1 ? nameParts.slice(1).join(' ') : '';

                    btn.disabled = true;
                    const origTxt = btn.innerText;
                    btn.innerText = "Sending...";

                    try {
                        const response = await fetch(`${API_BASE}/students/invite`, {
                            method: "POST",
                            headers: getHeaders(),
                            body: JSON.stringify({
                                firstName: firstName,
                                lastName: lastName,
                                email: email,
                                mobile: mobile,
                                batchId: parseInt(selectedBatchId)
                            })
                        });

                        if (response.ok) {
                            showToast("Student invitation sent successfully.", "success");
                            clearInputs(['sName', 'sEmail', 'sMobile']);
                            if(batchSelect) batchSelect.value = '';
                            await fetchStudents();
                        } else {
                            const errText = await response.text();
                            showToast("Error: " + errText, "error");
                        }
                    } catch (err) {
                        showToast("Server connection failed. Please try again.", "error");
                    } finally {
                        btn.disabled = false;
                        btn.innerText = origTxt;
                    }
                };
            }

            const searchInput = document.getElementById('searchStudent');
            if (searchInput) {
                searchInput.oninput = (e) => { renderStudents(e.target.value.trim().toLowerCase()); }
            }
        }

        function renderStudents(searchTerm = '') {
            const tbody = document.getElementById('studentTable');
            if (!tbody) return;

            let filteredStudents = students;
            if (searchTerm) {
                filteredStudents = students.filter(s => {
                    const displayName = s.firstName ? `${s.firstName} ${s.lastName || ''}`.trim() : (s.name || '');
                    const displayBatch = (s.batch && s.batch.name) ? s.batch.name : (s.batchName || "Not Assigned");
                    const hay = (displayName + ' ' + (s.email || '') + ' ' + displayBatch).toLowerCase();
                    return hay.includes(searchTerm);
                });
            }

            document.getElementById('totalStudentsCount').innerText = students.length;
            document.getElementById('activeStudentsCount').innerText = students.filter(s => s.status === 'ACTIVE').length;

            if (filteredStudents.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-400">No students found.</td></tr>`;
                return;
            }

            tbody.innerHTML = filteredStudents.map((s) => {
                const statusBadge = s.status === 'INVITED'
                    ? `<span class="bg-yellow-50 text-yellow-700 px-2.5 py-1 rounded-md border border-yellow-200 text-xs font-bold">Invited</span>`
                    : `<span class="bg-green-50 text-green-700 px-2.5 py-1 rounded-md border border-green-200 text-xs font-bold">Active</span>`;

                const displayName = s.firstName ? `${s.firstName} ${s.lastName || ''}`.trim() : (s.name || '');
                const displayBatch = (s.batch && s.batch.name) ? s.batch.name : (s.batchName || "Not Assigned");

                return `
                    <tr class="hover:bg-brand-50/30 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-800">${escapeHtml(displayName)}<br><small class="text-xs text-slate-500 font-normal">${escapeHtml(s.email)}</small></td>
                        <td class="px-6 py-4 text-slate-600">${escapeHtml(displayBatch)}</td>
                        <td class="px-6 py-4">${statusBadge}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteItem(${s.id}, 'student')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        /* ---------- FACULTY MANAGEMENT LOGIC ---------- */
        async function fetchFaculty() {
            try {
                const res = await fetch(`${API_BASE}/faculty`, { headers: getHeaders() });
                if (res.ok) facultyList = await res.json();
            } catch(e) { console.error(e); }
            renderFaculty();
        }

        async function initFacultyManagement() {
            await fetchFaculty();

            const btn = document.getElementById('addFacultyBtn');
            if (btn) {
                btn.onclick = async () => {
                    const firstName = document.getElementById('fFirstName').value.trim();
                    const lastName = document.getElementById('fLastName').value.trim();
                    const email = document.getElementById('fEmail').value.trim();

                    if (!firstName || !email) {
                        showToast("Please fill in all faculty details.", "warning");
                        return;
                    }

                    btn.disabled = true;
                    const origTxt = btn.innerText;
                    btn.innerText = "Sending...";

                    try {
                        const response = await fetch(`${API_BASE}/faculty/invite`, {
                            method: "POST",
                            headers: getHeaders(),
                            body: JSON.stringify({
                                firstName: firstName,
                                lastName: lastName,
                                email: email
                            })
                        });

                        if (response.ok) {
                            showToast("Faculty invitation sent successfully.", "success");
                            clearInputs(['fFirstName', 'fLastName', 'fEmail']);
                            await fetchFaculty();
                        } else {
                            const errText = await response.text();
                            showToast("Error: " + errText, "error");
                        }
                    } catch (err) {
                        showToast("Server connection failed. Please try again.", "error");
                    } finally {
                        btn.disabled = false;
                        btn.innerText = origTxt;
                    }
                };
            }
        }

        function renderFaculty() {
            const tbody = document.getElementById('facultyTable');
            if (!tbody) return;

            if (facultyList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-400">No faculty available.</td></tr>`;
                return;
            }

            tbody.innerHTML = facultyList.map((f) => {
                const statusBadge = f.status === "INVITED"
                    ? `<span class="bg-yellow-50 text-yellow-700 px-2.5 py-1 rounded-md border border-yellow-200 text-xs font-bold">Invited</span>`
                    : `<span class="bg-green-50 text-green-700 px-2.5 py-1 rounded-md border border-green-200 text-xs font-bold">Active</span>`;

                const displayName = f.firstName ? `${f.firstName} ${f.lastName || ''}`.trim() : (f.name || '');

                return `
                    <tr class="hover:bg-brand-50/30 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-800">${escapeHtml(displayName)}</td>
                        <td class="px-6 py-4 text-slate-600">${escapeHtml(f.email)}</td>
                        <td class="px-6 py-4">${statusBadge}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteItem(${f.id}, 'faculty')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        /* ---------- TIMETABLE MANAGEMENT LOGIC ---------- */
        async function fetchTimetables() {
            try {
                const res = await fetch(`${API_BASE}/timetables`, { headers: getHeaders() });
                if (res.ok) timetables = await res.json();
            } catch(e) { console.error(e); }
            renderTimetables();
        }

        async function initAdvancedTimetable() {
            await Promise.all([fetchBatches(), fetchFaculty(), fetchTimetables()]);

            const batchSelect = document.getElementById('tBatch');
            if(batchSelect) {
                batchSelect.innerHTML = `<option value="">Select Batch...</option>` + 
                    batches.map(b => `<option value="${b.id}">${escapeHtml(b.name || `${b.department}-${b.year}-${b.section}`)}</option>`).join('');
            }

            const facultySelect = document.getElementById('tFaculty');
            if(facultySelect) {
                facultySelect.innerHTML = `<option value="">Select Faculty...</option>` + 
                    facultyList.map(f => {
                        const displayName = f.firstName ? `${f.firstName} ${f.lastName || ''}`.trim() : f.name;
                        return `<option value="${f.id}">${escapeHtml(displayName)}</option>`;
                    }).join('');
            }

            const saveBtn = document.getElementById('saveTimetableBtn');
            if(saveBtn) {
                saveBtn.onclick = async () => {
                    const batchId = document.getElementById('tBatch').value;
                    const subject = document.getElementById('tSubject').value.trim();
                    const facultyId = document.getElementById('tFaculty').value;
                    const classroomName = document.getElementById('tClassroom').value.trim();
                    const day = document.getElementById('tDay').value;
                    const startTime = document.getElementById('tStartTime').value;
                    const endTime = document.getElementById('tEndTime').value;

                    if(!batchId || !subject || !facultyId || !classroomName || !startTime || !endTime) {
                        showToast("Please fill in all timetable details.", "warning");
                        return;
                    }

                    saveBtn.disabled = true;
                    saveBtn.innerText = "Saving...";

                    try {
                        const response = await fetch(`${API_BASE}/timetables`, {
                            method: "POST",
                            headers: getHeaders(),
                            body: JSON.stringify({
                                batchId: parseInt(batchId),
                                subject: subject,
                                facultyId: parseInt(facultyId),
                                classroomName: classroomName,
                                dayOfWeek: day,
                                startTime: startTime,
                                endTime: endTime
                            })
                        });

                        if (response.ok) {
                            clearInputs(['tSubject', 'tClassroom', 'tStartTime', 'tEndTime']);
                            document.getElementById('tBatch').value = "";
                            document.getElementById('tFaculty').value = "";
                            showToast("Timetable saved successfully.", "success");
                            await fetchTimetables();
                        } else {
                            showToast("Failed to save timetable.", "error");
                        }
                    } catch (err) {
                        showToast("Server connection failed. Please try again.", "error");
                    } finally {
                        saveBtn.disabled = false;
                        saveBtn.innerText = "Save Timetable";
                    }
                };
            }
        }

        function renderTimetables() {
            const tbody = document.getElementById('timetableTableAdvanced');
            if(!tbody) return;

            if(timetables.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-slate-400">No schedules created yet.</td></tr>`;
                return;
            }

            tbody.innerHTML = timetables.map(t => `
                <tr class="hover:bg-brand-50/30 transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-800">${escapeHtml(t.batch?.name || t.batchName || '-')}</td>
                    <td class="px-6 py-4 text-slate-700">${escapeHtml(t.subject)}</td>
                    <td class="px-6 py-4 text-slate-600">${escapeHtml(
                        t.faculty 
                        ? `${t.faculty.firstName || ''} ${t.faculty.lastName || ''}`.trim()
                        : (t.facultyName || '-')
                    )}</td>
                    <td class="px-6 py-4 text-slate-500 font-medium">${escapeHtml(t.classroomName)}</td>
                    <td class="px-6 py-4 text-slate-600">${escapeHtml(t.dayOfWeek || t.day)} <br><span class="font-mono text-xs text-slate-400">${t.startTime} - ${t.endTime}</span></td>
                    <td class="px-6 py-4"><span class="bg-green-50 text-green-700 px-2.5 py-1 rounded-md border border-green-200 text-xs font-bold uppercase tracking-wide">Scheduled</span></td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteItem(${t.id}, 'timetable')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        /* ---------- SHARED FUNCTIONS ---------- */
        // Generic delete using real backend API
        async function deleteItem(id, type) {
            if (!confirm(`Are you sure you want to delete this ${type}?`)) return;
            
            // Map types to endpoints
            let endpoint = "";
            if (type === 'batch') endpoint = "batches"; 
            else if (type === 'student') endpoint = "students";
            else if (type === 'faculty') endpoint = "faculty";
            else if (type === 'timetable') endpoint = "timetables";

            try {
                const response = await fetch(`${API_BASE}/${endpoint}/${id}`, {
                    method: "DELETE",
                    headers: getHeaders()
                });

                if (response.ok) {
                    showToast(`${type.charAt(0).toUpperCase() + type.slice(1)} deleted successfully.`, "success");
                    // Refetch specific list after delete
                    if (type === 'batch') fetchBatches();
                    else if (type === 'student') fetchStudents();
                    else if (type === 'faculty') fetchFaculty();
                    else if (type === 'timetable') fetchTimetables();
                } else {
                    const err = await response.text();
                    showToast(`Failed to delete. Error: ${err}`, "error");
                }
            } catch (err) {
                console.error(err);
                showToast("Server connection failed. Please try again.", "error");
            }
        }

        function clearInputs(elements) {
            if (!elements || !elements.length) return;
            elements.forEach(id => {
                const el = typeof id === 'string' ? document.getElementById(id) : id;
                if (el) try { el.value = ''; } catch(e){ /* noop */ }
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // Initialize First View
        document.addEventListener("DOMContentLoaded", function () {
            switchView('batches'); // Default load
        });
    </script>
